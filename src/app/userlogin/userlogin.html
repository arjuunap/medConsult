<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<div class="page-wrapper">

  <div class="form-card">

    <!-- Top accent bar -->
    <div class="card-accent"></div>

    <!-- Header -->
    <div class="card-header">
      <div class="logo-circle">
        <svg xmlns="http://www.w3.org/2000/svg" width="30" height="30" viewBox="0 0 24 24" fill="none">
          <path d="M12 21.593c-5.63-5.539-11-10.297-11-14.402C1 3.518 4.945 1 8 1c2.026 0 3.98 1.012 5 2.997C14.02 2.012 15.974 1 18 1c3.055 0 7 2.518 7 6.191 0 4.105-5.369 8.863-11 14.402z" fill="#3aad6e"/>
          <rect x="11" y="6" width="2" height="7" rx="1" fill="white"/>
          <rect x="8" y="9" width="8" height="2" rx="1" fill="white"/>
        </svg>
      </div>
      <h2>Welcome Back</h2>
      <!-- <p>Sign in to your patient account</p> -->
    </div>

    <!-- Form Body -->
    <div class="card-body">
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" novalidate>

        <!-- Email -->
        <div class="form-group"
          [class.field-error]="loginForm.get('email')?.touched && loginForm.get('email')?.invalid"
          [class.field-success]="loginForm.get('email')?.touched && loginForm.get('email')?.valid">
          <label for="email">Email Address <span class="star">*</span></label>
          <div class="input-box">
            <svg class="field-icon" xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="2" y="4" width="20" height="16" rx="2"/>
              <polyline points="22,4 12,13 2,4"/>
            </svg>
            <input
              id="email"
              type="email"
              formControlName="email"
              placeholder="john.doe@example.com"
              autocomplete="email"
            />
            <svg class="check-icon" *ngIf="loginForm.get('email')?.touched && loginForm.get('email')?.valid"
              xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24"
              fill="none" stroke="#3aad6e" stroke-width="3">
              <polyline points="20 6 9 17 4 12"/>
            </svg>
          </div>
          <span class="err-msg" *ngIf="loginForm.get('email')?.touched && loginForm.get('email')?.errors">
            <svg xmlns="http://www.w3.org/2000/svg" width="11" height="11" viewBox="0 0 24 24" fill="#e05c5c">
              <circle cx="12" cy="12" r="10"/>
              <rect x="11" y="7" width="2" height="6" fill="white" rx="1"/>
              <rect x="11" y="15" width="2" height="2" fill="white" rx="1"/>
            </svg>
            <span *ngIf="loginForm.get('email')?.errors?.['required']">Email address is required</span>
            <span *ngIf="loginForm.get('email')?.errors?.['email']">Please enter a valid email address</span>
          </span>
        </div>

        <!-- Divider -->
        <div class="divider"></div>

        <!-- Password -->
        <div class="form-group"
          [class.field-error]="loginForm.get('password')?.touched && loginForm.get('password')?.invalid"
          [class.field-success]="loginForm.get('password')?.touched && loginForm.get('password')?.valid">

          <div class="label-row">
            <label for="password">Password <span class="star">*</span></label>
            <a routerLink="/forgot-password" class="forgot-link">Forgot password?</a>
          </div>

          <div class="input-box">
            <svg class="field-icon" xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="11" width="18" height="11" rx="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            <input
              id="password"
              [type]="showPassword ? 'text' : 'password'"
              formControlName="password"
              placeholder="Enter your password"
              autocomplete="current-password"
            />
            <button type="button" class="eye-btn" (click)="togglePassword()">
              <svg *ngIf="!showPassword" xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
              <svg *ngIf="showPassword" xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                <line x1="1" y1="1" x2="23" y2="23"/>
              </svg>
            </button>
          </div>

          <span class="err-msg" *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.errors">
            <svg xmlns="http://www.w3.org/2000/svg" width="11" height="11" viewBox="0 0 24 24" fill="#e05c5c">
              <circle cx="12" cy="12" r="10"/>
              <rect x="11" y="7" width="2" height="6" fill="white" rx="1"/>
              <rect x="11" y="15" width="2" height="2" fill="white" rx="1"/>
            </svg>
            <span *ngIf="loginForm.get('password')?.errors?.['required']">Password is required</span>
          </span>
        </div>

        <!-- Submit -->
        <button type="submit" class="submit-btn" [disabled]="loginForm.invalid">
          Sign In
          <svg xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="5" y1="12" x2="19" y2="12"/>
            <polyline points="12 5 19 12 12 19"/>
          </svg>
        </button>

        <!-- Server messages -->
        <div class="server-error" *ngIf="errorMsg">
          <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="8" x2="12" y2="12"/>
            <line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
          {{ errorMsg }}
        </div>
        <div class="server-success" *ngIf="successMsg">
          <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
          {{ successMsg }}
        </div>

      </form>
    </div>

    <!-- Footer -->
    <div class="card-footer">
      Don't have an account?
      <a routerLink="/register">Create account</a>
    </div>

  </div>

</div>
